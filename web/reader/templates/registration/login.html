{% extends "reader/base.html" %}

{% block title %}Log in · Personal Librarian{% endblock %}

{% block content %}
  <section class="panel">
    <h1>Log in</h1>
    <p class="muted">Use an account created by an administrator.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Log in</button>
    </form>
  </section>
{% endblock %}
