<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Personal Librarian{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #242826;
        --muted: #707773;
        --paper: #fffdfa;
        --panel: #ffffff;
        --warm-panel: #fffaf3;
        --line: #ece6dc;
        --accent: #7f4a31;
        --accent-dark: #5e3524;
        --shadow: rgba(76, 58, 40, 0.07);
        --serif: Georgia, "Times New Roman", serif;
        --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(127, 74, 49, 0.06), transparent 32rem),
          linear-gradient(135deg, #fffdfa 0%, #faf5ed 100%);
        color: var(--ink);
        font-family: var(--serif);
        line-height: 1.6;
        min-height: 100vh;
      }

      a {
        color: var(--accent-dark);
      }

      .shell {
        margin: 0 auto;
        max-width: 920px;
        padding: 28px 20px 56px;
      }

      .topbar {
        align-items: center;
        display: flex;
        font-family: var(--sans);
        gap: 16px;
        justify-content: space-between;
        margin-bottom: 34px;
      }

      .brand {
        color: var(--ink);
        font-size: 15px;
        font-weight: 650;
        letter-spacing: -0.01em;
        text-decoration: none;
      }

      .nav {
        align-items: center;
        display: flex;
        gap: 12px;
      }

      .button,
      button {
        background: var(--accent);
        border: 0;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        display: inline-block;
        font-family: var(--sans);
        font-size: 14px;
        font-weight: 550;
        line-height: 1.2;
        padding: 10px 14px;
        text-decoration: none;
      }

      .button:hover,
      button:hover {
        background: var(--accent-dark);
      }

      .button.secondary,
      button.secondary {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        color: var(--accent-dark);
      }

      .button.secondary:hover,
      button.secondary:hover {
        background: #f8f3ea;
      }

      button:disabled {
        background: #ece8e1;
        color: #aaa39a;
        cursor: not-allowed;
      }

      .panel {
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 18px 44px var(--shadow);
        padding: 28px;
      }

      .panel h1,
      .panel h2:not(.notes h2),
      .book-card,
      .muted,
      .actions,
      label,
      input {
        font-family: var(--sans);
      }

      .panel h1,
      .panel h2:not(.notes h2) {
        letter-spacing: -0.035em;
        line-height: 1.08;
      }

      .book-grid {
        display: grid;
        gap: 16px;
      }

      .book-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 22px;
      }

      .muted {
        color: var(--muted);
      }

      .reader-text {
        font-family: var(--serif);
        font-size: 20px;
        line-height: 1.85;
        white-space: pre-wrap;
      }

      .notes {
        background: var(--warm-panel);
        border: 1px solid var(--line);
        border-left: 3px solid rgba(127, 74, 49, 0.55);
        border-radius: 0 10px 10px 0;
        margin-top: 28px;
        padding: 18px 22px;
      }

      .notes h2 {
        font-family: var(--sans);
        font-size: 18px;
        letter-spacing: -0.02em;
        margin: 0 0 8px;
      }

      .notes div {
        font-family: var(--serif);
      }

      .progress {
        background: #eee8de;
        border-radius: 8px;
        height: 8px;
        overflow: hidden;
      }

      .progress span {
        background: var(--accent);
        display: block;
        height: 100%;
      }

      .actions {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 22px;
      }

      input {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        font-size: 14px;
        padding: 9px 10px;
      }

      .inline {
        display: inline;
      }

      @media (max-width: 640px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .panel {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="{% url 'reader:book_list' %}">Personal Librarian</a>
        <nav class="nav">
          {% if request.user.is_authenticated %}
            <span class="muted">{{ request.user.username }}</span>
            <form class="inline" method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button class="secondary" type="submit">Log out</button>
            </form>
          {% endif %}
        </nav>
      </header>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
